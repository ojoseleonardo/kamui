<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="50%" stop-color="#c41e3a"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c41e3a"/>
      <stop offset="50%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#c41e3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#ringGrad)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Iris Background -->
  <circle cx="50" cy="50" r="42" fill="#1a0000"/>
  
  <!-- Red Iris -->
  <circle cx="50" cy="50" r="38" fill="url(#irisGrad)"/>
  
  <!-- Inner Black Ring -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Pupil -->
  <circle cx="50" cy="50" r="12" fill="#0a0a0a"/>
  
  <!-- Tomoe 1 -->
  <g transform="rotate(0, 50, 50)">
    <path d="M50 20 Q60 30 50 35 Q40 30 50 20" fill="#0a0a0a"/>
    <circle cx="50" cy="25" r="4" fill="#0a0a0a"/>
  </g>
  
  <!-- Tomoe 2 -->
  <g transform="rotate(120, 50, 50)">
    <path d="M50 20 Q60 30 50 35 Q40 30 50 20" fill="#0a0a0a"/>
    <circle cx="50" cy="25" r="4" fill="#0a0a0a"/>
  </g>
  
  <!-- Tomoe 3 -->
  <g transform="rotate(240, 50, 50)">
    <path d="M50 20 Q60 30 50 35 Q40 30 50 20" fill="#0a0a0a"/>
    <circle cx="50" cy="25" r="4" fill="#0a0a0a"/>
  </g>
  
  <!-- Highlight -->
  <ellipse cx="40" cy="40" rx="5" ry="3" fill="rgba(255,255,255,0.2)" transform="rotate(-30, 40, 40)"/>
</svg>
